<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio TV Bem Falante</title>
    <style>
        /* Cores Extraídas: Vermelho, Laranja e Cinza */
        :root {
            --vermelho: #D32F2F;
            --laranja: #F57C00;
            --cinza-escuro: #424242;
            --cinza-claro: #F5F5F5;
            --branco: #FFFFFF;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--cinza-claro); 
            color: var(--cinza-escuro); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            text-align: center;
        }

        header { 
            background: linear-gradient(135deg, var(--vermelho), var(--laranja));
            color: var(--branco); 
            width: 100%; 
            padding: 30px 0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { 
            margin: 0; 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 90%;
            max-width: 500px;
            padding: 20px 0;
        }

        /* Player Customizado */
        .player-box {
            width: 100%;
            background: var(--branco);
            border-top: 5px solid var(--vermelho);
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .status-live {
            color: var(--vermelho);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: var(--vermelho);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(211, 47, 47, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        audio {
            width: 100%;
            margin-top: 10px;
            height: 45px;
        }

        footer { 
            width: 100%; 
            padding: 30px 0; 
            background-color: var(--branco);
            border-top: 1px solid #ddd;
        }

        .btn-insta { 
            display: inline-block;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            color: white; 
            padding: 15px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3);
        }

        .btn-insta:active {
            transform: scale(0.95);
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--cinza-escuro);
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>TV BEM FALANTE</h1>
    </header>

    <div class="container">
        <div class="status-live">
            <div class="pulse"></div> NO AR AGORA
        </div>
        
        <div class="player-box">
            <p style="margin-bottom: 20px; font-weight: 500;">Ouvir Programaçăo ao Vivo</p>
            
            <audio controls>
                <source src="https://stream.zeno.fm/f718a010rxhvv" type="audio/mpeg">
                Seu navegador năo suporta este player.
            </audio>
            
            <p class="tagline">A voz que fala com vocę!</p>
        </div>
    </div>

    <footer>
        <a href="http://instagram.com/radiotvbemfalante" target="_blank" class="btn-insta">
            Siga no Instagram
        </a>
    </footer>

</body>
</html>
