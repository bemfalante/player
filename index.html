<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R·dio TV Bem Falante</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; /* Distribui entre topo e base */
            height: 100vh;
            
            /* Logo real como fundo total */
            background-image: url('logo.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #FFFFFF; 
            overflow: hidden;
        }

        /* Status "NO AR" posicionado na ·rea cinza superior do logo */
        .status-topo {
            margin-top: 10vh; /* Ajuste este valor para subir/descer no cinza superior */
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 900;
            font-size: 1.2rem;
            color: #333;
            text-transform: uppercase;
        }

        .pulse-red {
            width: 15px;
            height: 15px;
            background: #FF0000;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(255, 0, 0, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        /* Player posicionado na ·rea cinza inferior do logo */
        .player-base {
            margin-bottom: 10vh; /* Ajuste este valor para subir/descer no cinza inferior */
            width: 80%;
            max-width: 300px;
        }

        audio {
            width: 100%;
            height: 40px;
            opacity: 0.9; /* Deixa o player levemente integrado ao fundo */
        }
    </style>
</head>
<body>

    <div class="status-topo">
        <div class="pulse-red"></div> NO AR
    </div>

    <div class="player-base">
        <audio controls>
            <source src="https://stream.zeno.fm/f718a010rxhvv" type="audio/mpeg">
        </audio>
    </div>

</body>
</html>
