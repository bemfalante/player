<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rįdio TV Bem Falante</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FFFFFF">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            height: 100vh;
            background: #FFFFFF url('logo.png') no-repeat center;
            background-size: contain;
            overflow: hidden;
        }

        /* Mantendo a posiēćo original de 10vh para nćo bater no microfone */
        .status-topo {
            margin-top: 10vh; 
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 900;
            font-size: 1.2rem;
            color: #333;
            text-transform: uppercase;
        }

        .pulse-red {
            width: 15px;
            height: 15px;
            background: #FF0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        /* Mantendo a posiēćo original de 10vh para nćo bater no microfone */
        .player-base {
            margin-bottom: 10vh; 
            width: 80%;
            max-width: 300px;
        }

        audio { 
            width: 100%; 
            height: 40px;
            opacity: 0.9;
        }

        /* Botćo Flutuante Discreto */
        .insta-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="status-topo">
        <div class="pulse-red"></div> NO AR
    </div>

    <div class="player-base">
        <audio controls>
            <source src="https://stream.zeno.fm/f718a010rxhvv" type="audio/mpeg">
        </audio>
    </div>

    <a href="http://instagram.com/radiotvbemfalante" target="_blank" class="insta-float">
        <i class="fab fa-instagram"></i>
    </a>

</body>
</html>
